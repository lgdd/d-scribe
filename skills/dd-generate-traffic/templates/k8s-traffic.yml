# Traffic generator Deployment — excluded from Datadog monitoring.
# Runs Locust in headless mode to produce consistent synthetic traffic.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic
  labels:
    app: traffic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic
  template:
    metadata:
      labels:
        app: traffic
      annotations:
        admission.datadoghq.com/enabled: "false"
        ad.datadoghq.com/traffic.logs: '[{"source":"traffic","log_processing_rules":[{"type":"exclude_at_match","name":"exclude_all","pattern":".*"}]}]'
    spec:
      containers:
        - name: traffic
          image: locustio/locust
          command:
            - locust
          args:
            - "-f"
            - /locust/locustfile.py
            - "--host"
            - "$(TRAFFIC_TARGET)"
            - "--headless"
            - "--users"
            - "$(TRAFFIC_RATE)"
            - "--spawn-rate"
            - "$(TRAFFIC_RATE)"
          env:
            - name: TRAFFIC_TARGET
              value: "http://api-gateway:8080"
            - name: TRAFFIC_RATE
              value: "10"
            - name: TRAFFIC_ERROR_RATE
              value: "0.1"
            - name: TRAFFIC_LATENCY_MS
              value: "0"
          volumeMounts:
            - name: locustfile
              mountPath: /locust
              readOnly: true
      volumes:
        - name: locustfile
          configMap:
            name: traffic-locustfile
