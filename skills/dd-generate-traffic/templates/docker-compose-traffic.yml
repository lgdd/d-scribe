# Traffic generator service — add this to your docker-compose.yml.
# Runs Locust in headless mode to produce consistent synthetic traffic
# for the lifetime of the stack. Excluded from Datadog monitoring.

  traffic:
    image: locustio/locust
    command: >-
      -f /locust/locustfile.py
      --host ${TRAFFIC_TARGET:-http://api-gateway:8080}
      --headless
      --users ${TRAFFIC_RATE:-10}
      --spawn-rate ${TRAFFIC_RATE:-10}
      --run-time ${TRAFFIC_DURATION:-0}
    environment:
      - TRAFFIC_ERROR_RATE=${TRAFFIC_ERROR_RATE:-0.1}
      - TRAFFIC_LATENCY_MS=${TRAFFIC_LATENCY_MS:-0}
    volumes:
      - ./traffic/locustfile.py:/locust/locustfile.py:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    labels:
      com.datadoghq.ad.logs: '[{"source":"traffic","log_processing_rules":[{"type":"exclude_at_match","name":"exclude_all","pattern":".*"}]}]'
    restart: unless-stopped
